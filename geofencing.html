<!DOCTYPE html>
<html>
<head>
    <title>Geofencing Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f0f4f8;
        }
        #box {
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            background: #0078ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>

<div id="box">
    <h2>Geofencing Attendance System</h2>
    <p><b>Status:</b> <span id="status">Click the button to mark attendance</span></p>
    <button onclick="markAttendance()">Mark Attendance</button>
</div>

<script>
// ----------- SET YOUR GEOFENCE LOCATION HERE -----------------
const officeLat =17.99325;   // Example: Visakhapatnam latitude
const officeLng = 83.41645;   // Example: Visakhapatnam longitude
const allowedRadius = 100;   // in meters
// --------------------------------------------------------------

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // meters
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c; // distance in meters
}

function markAttendance() {
    const status = document.getElementById("status");

    if (!navigator.geolocation) {
        status.textContent = "Geolocation not supported!";
        return;
    }

    navigator.geolocation.getCurrentPosition(success, error);
    
    function success(position) {
        const userLat = position.coords.latitude;
        const userLng = position.coords.longitude;

        const distance = calculateDistance(userLat, userLng, officeLat, officeLng);

        if (distance <= allowedRadius) {
            status.textContent = "Attendance Marked ✔ (Inside Geofence)";
            status.style.color = "green";
        } else {
            status.textContent = "Outside allowed area ❌ (" + Math.round(distance) + "m away)";
            status.style.color = "red";
        }
    }

    function error() {
        status.textContent = "Unable to get location!";
        status.style.color = "orange";
    }
}
</script>

</body>
</html>
